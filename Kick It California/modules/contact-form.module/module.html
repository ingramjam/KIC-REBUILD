<div class="contact-form-section section">
  <div class="container">
    <div class="form-wrapper">
      <div class="form-header text-center mb-lg">
        <h2 class="form-title animate-on-scroll">{{ module.form_title }}</h2>
        <div class="form-description animate-on-scroll">{{ module.form_description }}</div>
      </div>
      
      <form class="contact-form validate-form animate-on-scroll" method="post">
        {% if module.form_fields.show_name %}
        <div class="form-group">
          <label for="name" class="form-label">Full Name *</label>
          <input type="text" id="name" name="name" class="form-control" required>
        </div>
        {% endif %}
        
        {% if module.form_fields.show_email %}
        <div class="form-group">
          <label for="email" class="form-label">Email Address *</label>
          <input type="email" id="email" name="email" class="form-control" required>
        </div>
        {% endif %}
        
        {% if module.form_fields.show_phone %}
        <div class="form-group">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="tel" id="phone" name="phone" class="form-control">
        </div>
        {% endif %}
        
        {% if module.form_fields.show_message %}
        <div class="form-group">
          <label for="message" class="form-label">Message *</label>
          <textarea id="message" name="message" class="form-control" rows="5" required></textarea>
        </div>
        {% endif %}
        
        <div class="form-group">
          <button type="submit" class="btn btn-primary btn-block">{{ module.submit_button_text }}</button>
        </div>
        
        <div class="success-message" style="display: none;">
          {{ module.success_message }}
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  .form-wrapper {
    max-width: 600px;
    margin: 0 auto;
    background: white;
    padding: 3rem;
    border-radius: var(--border-radius-lg);
    box-shadow: var(--shadow-lg);
  }
  
  .form-title {
    color: var(--primary-color);
    margin-bottom: 1rem;
  }
  
  .form-description {
    color: #666;
    font-size: 1.1rem;
  }
  
  .btn-block {
    width: 100%;
  }
  
  .error-message {
    color: #e74c3c;
    font-size: 0.875rem;
    margin-top: 0.5rem;
  }
  
  .form-control.error {
    border-color: #e74c3c;
  }
  
  .success-message {
    background-color: #27ae60;
    color: white;
    padding: 1rem;
    border-radius: var(--border-radius-md);
    text-align: center;
    margin-top: 1rem;
  }
  
  @media (max-width: 768px) {
    .form-wrapper {
      padding: 2rem 1.5rem;
    }
  }
</style>
