<section class="cta-section">
  <div class="cta-content">
    <span class="section-label">{{ module.section_label }}</span>
    <h2>{{ module.title }}</h2>
    <p>{{ module.description }}</p>
    <div class="hero-buttons">
      <a href="{{ module.primary_button_url }}" class="hero-button-primary">
        {{ module.primary_button_text }}
      </a>
      <a href="{{ module.secondary_button_url }}" class="hero-button-secondary">
        {{ module.secondary_button_text }}
      </a>
    </div>
  </div>
</section>
